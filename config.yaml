protein:
  source: pdb           # "pdb" or "fasta"
  pdb_id: 2HYY          # used if source=pdb
  chain: A              # used if source=pdb
  name: abl1            # used for output directory naming
  # fasta_path: ./my_protein.fasta   # used if source=fasta

bioemu:
  num_samples: 10
  model_version: v1.2
  filter_samples: true

gromacs:
  forcefield: charmm36-jul2020    # name of the .ff directory in GROMACS top/
  water_model: tip3p              # must match forcefield (check available models in FF dir)
  threads: 8

  box:
    type: dodecahedron            # cubic, dodecahedron, octahedron, etc.
    clearance: 1.0                # nm distance from protein to box edge

  ions:
    concentration: 0.15           # molar NaCl concentration
    pname: NA                     # positive ion name
    nname: CL                     # negative ion name

  em_vacuum:
    emtol: 100                    # kJ/mol/nm convergence tolerance
    nsteps: 5000                  # max steps
    restraint_fc: 50              # kJ/mol/nm^2, all non-H atoms

  em_solvated:
    emtol: 1000                   # kJ/mol/nm^2 convergence tolerance
    nsteps: 50000                 # max steps
    restraint_fc: 500             # kJ/mol/nm^2, heavy atoms

  nvt:
    temperature: 300              # K
    dt: 0.002                     # ps (2 fs timestep)
    nsteps: 25000                 # total steps (dt * nsteps = simulation time; 50 ps at default)
    restraint_fc: 5               # kJ/mol/nm^2, CA atoms only
    tcoupl: V-rescale             # thermostat (V-rescale, berendsen, nose-hoover)
    tau_t: 0.1                    # temperature coupling time constant (ps)

flowpacker:
  repo_path: ../flowpacker                  # path to cloned FlowPacker repo
  checkpoint: checkpoints/cluster.pth       # relative to repo_path
  num_steps: 10
  n_samples: 1

molprobity:
  enabled: true

output_dir: ./output
